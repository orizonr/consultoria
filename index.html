<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#050810;color:#00e5ff;font-family:'Share Tech Mono',monospace;overflow:hidden;user-select:none;}

/* GRID */
.grid-bg{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,229,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.035) 1px,transparent 1px);
  background-size:48px 48px;animation:gridMove 25s linear infinite;}
@keyframes gridMove{from{background-position:0 0;}to{background-position:48px 48px;}}

/* SCANLINES */
.scanline{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);}

/* VIGNETTE */
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 35%,rgba(5,8,16,0.9) 100%);}

/* BORDER LINES */
.line-h{position:fixed;left:0;right:0;height:1px;z-index:5;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,0.4),transparent);
  animation:hFlicker 5s ease-in-out infinite;}
.line-h.top{top:0;}.line-h.bottom{bottom:0;animation-delay:-2.5s;}
@keyframes hFlicker{0%,100%{opacity:0.25;}50%{opacity:0.8;}}

/* CORNERS */
.corner{position:fixed;z-index:6;width:28px;height:28px;}
.corner::before,.corner::after{content:'';position:absolute;background:rgba(0,229,255,0.55);}
.corner::before{width:100%;height:1px;top:0;left:0;}
.corner::after{width:1px;height:100%;top:0;left:0;}
.c-tl{top:14px;left:14px;}
.c-tr{top:14px;right:14px;transform:scaleX(-1);}
.c-br{bottom:14px;right:14px;transform:scale(-1);}
.c-bl{bottom:14px;left:14px;transform:scaleY(-1);}

/* STATUS TOPO DIREITA */
.hud-tr{position:fixed;top:18px;right:18px;z-index:10;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.hud-item{font-size:8.5px;letter-spacing:2px;color:rgba(0,229,255,0.45);display:flex;align-items:center;gap:7px;
  opacity:0;animation:fadeIn 0.4s ease forwards;}
.hud-item:nth-child(1){animation-delay:1.8s;}
.hud-item:nth-child(2){animation-delay:2.1s;}
.hud-item:nth-child(3){animation-delay:2.4s;}
.hud-dot{width:5px;height:5px;border-radius:50%;animation:dp 2s ease-in-out infinite;}
.hud-dot.g{background:#00ff88;box-shadow:0 0 5px #00ff88;}
.hud-dot.y{background:#ffcc00;box-shadow:0 0 5px #ffcc00;animation-delay:-1s;}
@keyframes dp{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* STATUS BAIXO ESQUERDA */
.hud-bl{position:fixed;bottom:18px;left:18px;z-index:10;display:flex;flex-direction:column;gap:3px;
  opacity:0;animation:fadeIn 0.4s 2.5s ease forwards;}
.hud-bl span{font-size:8px;letter-spacing:2px;color:rgba(0,229,255,0.25);}

/* STATUS BAIXO DIREITA */
.hud-br{position:fixed;bottom:18px;right:18px;z-index:10;
  opacity:0;animation:fadeIn 0.4s 2.5s ease forwards;}
.hud-br span{font-size:8px;letter-spacing:2px;color:rgba(0,229,255,0.25);}

@keyframes fadeIn{to{opacity:1;}}

/* ── LOADER ── */
.loader{position:fixed;inset:0;z-index:50;background:#050810;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  transition:opacity 0.7s ease;}
.ld-label{font-size:8px;letter-spacing:4px;color:rgba(0,229,255,0.35);}
.ld-bar-wrap{width:180px;height:1px;background:rgba(0,229,255,0.1);}
.ld-bar{height:1px;width:0%;background:#00e5ff;box-shadow:0 0 8px #00e5ff;transition:width 0.08s linear;}
.ld-pct{font-size:11px;letter-spacing:3px;color:rgba(0,229,255,0.5);}
.ld-step{font-size:7.5px;letter-spacing:2px;color:rgba(0,229,255,0.25);height:12px;}

/* ── CENTRO ── */
.stage{position:fixed;inset:0;z-index:8;display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.8s ease;}

.logo-ring{
  width:180px;height:180px;border-radius:50%;
  border:1.5px solid rgba(0,229,255,0.35);
  box-shadow:0 0 32px rgba(0,229,255,0.2),0 0 80px rgba(0,229,255,0.08),inset 0 0 32px rgba(0,229,255,0.06);
  overflow:hidden;margin-bottom:1.75rem;
  opacity:0;animation:ringIn 0.9s 0.1s ease forwards;
  position:relative;background:#050d1a;
}
.logo-ring::before{content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg,rgba(0,229,255,0.08),transparent 60%);z-index:1;}
.logo-ring img{width:100%;height:100%;object-fit:contain;position:relative;z-index:2;}
@keyframes ringIn{from{opacity:0;transform:scale(0.75);}to{opacity:1;transform:scale(1);}}

.eyebrow{font-size:8.5px;letter-spacing:5px;color:rgba(0,229,255,0.4);margin-bottom:1rem;
  opacity:0;animation:fadeIn 0.5s 0.3s ease forwards;}

.title{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(3rem,9vw,6.5rem);
  letter-spacing:0.35em;
  padding-left:0.35em;
  color:#00e5ff;
  text-shadow:0 0 18px rgba(0,229,255,0.9),0 0 50px rgba(0,229,255,0.4),0 0 100px rgba(0,229,255,0.15);
  line-height:1;margin-bottom:0.4em;
  opacity:0;animation:titleReveal 1.1s 0.5s ease forwards;
}
@keyframes titleReveal{
  from{opacity:0;letter-spacing:1em;filter:blur(10px);}
  to{opacity:1;letter-spacing:0.35em;filter:blur(0);}
}

.tagline{
  font-size:clamp(8px,1.4vw,10.5px);letter-spacing:0.45em;
  color:rgba(0,229,255,0.55);
  display:flex;align-items:center;gap:0.9em;
  margin-bottom:2.5rem;
  opacity:0;animation:fadeIn 0.5s 1s ease forwards;
}

.sep{width:200px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.35),transparent);
  margin-bottom:2.5rem;position:relative;
  opacity:0;animation:fadeIn 0.5s 1.2s ease forwards;}
.sep::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:3px;height:3px;border-radius:50%;background:#00e5ff;box-shadow:0 0 6px #00e5ff;}

/* BOTÕES */
.btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  opacity:0;animation:fadeIn 0.5s 1.5s ease forwards;}

.btn{
  font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;
  text-decoration:none;padding:15px 28px;border-radius:3px;cursor:pointer;
  display:inline-flex;align-items:center;gap:12px;transition:all 0.22s;
  position:relative;overflow:hidden;font-weight:700;
}
.btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.06),transparent);
  opacity:0;transition:opacity 0.22s;}
.btn:hover::after{opacity:1;}

.btn-p{
  background:rgba(0,229,255,0.15);border:2px solid #00e5ff;color:#00e5ff;
  box-shadow:0 0 28px rgba(0,229,255,0.55),inset 0 0 20px rgba(0,229,255,0.1);
  text-shadow:0 0 12px rgba(0,229,255,1),0 0 24px rgba(0,229,255,0.6);}
.btn-p:hover{background:rgba(0,229,255,0.25);border-color:#00e5ff;
  box-shadow:0 0 48px rgba(0,229,255,0.7),inset 0 0 28px rgba(0,229,255,0.15);transform:translateY(-2px);}

.btn-s{background:rgba(0,229,255,0.07);border:2px solid #00e5ff;color:#00e5ff;
  box-shadow:0 0 22px rgba(0,229,255,0.4),inset 0 0 14px rgba(0,229,255,0.07);
  text-shadow:0 0 10px rgba(0,229,255,1),0 0 20px rgba(0,229,255,0.5);}
.btn-s:hover{background:rgba(0,229,255,0.18);border-color:#00e5ff;color:#fff;
  box-shadow:0 0 40px rgba(0,229,255,0.65),inset 0 0 22px rgba(0,229,255,0.12);transform:translateY(-2px);
  box-shadow:0 0 22px rgba(0,229,255,0.25);transform:translateY(-2px);}

.arr{transition:transform 0.2s;}
.btn-p:hover .arr{transform:translateX(4px);}

/* CANVAS */
#cvs{position:fixed;inset:0;z-index:3;pointer-events:none;}

/* MOBILE */
@media(max-width:480px){
  .title{letter-spacing:0.15em;}
  .btns{flex-direction:column;align-items:center;}
  .btn{width:260px;justify-content:center;font-size:12px;padding:16px 20px;letter-spacing:2.5px;}
  .btn-p{box-shadow:0 0 32px rgba(0,229,255,0.55),inset 0 0 20px rgba(0,229,255,0.1);border-color:#00e5ff;}
  .btn-s{border-color:#00e5ff;color:#00e5ff;box-shadow:0 0 26px rgba(0,229,255,0.45),inset 0 0 14px rgba(0,229,255,0.07);text-shadow:0 0 10px rgba(0,229,255,1);}
  .hud-tr,.hud-br{display:none;}
}
</style>
</head>

<script>
// RELÓGIO
function tick(){
  const n=new Date();
  const pad=v=>String(v).padStart(2,'0');
  const el=document.getElementById('clock');
  if(el) el.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}
tick(); setInterval(tick,1000);

// LOADER
const ldBar=document.getElementById('ldBar');
const ldPct=document.getElementById('ldPct');
const ldStep=document.getElementById('ldStep');
const loader=document.getElementById('loader');
const stage=document.getElementById('stage');

const steps=[
  {to:18,ms:3,txt:'CARREGANDO MÓDULOS'},
  {to:42,ms:3,txt:'CONECTANDO BASE DE DADOS'},
  {to:66,ms:3,txt:'SINCRONIZANDO PIPELINE'},
  {to:84,ms:3,txt:'INICIANDO MÓDULO IA'},
  {to:100,ms:2,txt:'SISTEMA PRONTO'},
];

let cur=0,si=0;
function step(){
  if(si>=steps.length){done();return;}
  const s=steps[si];
  if(cur<s.to){
    cur++;
    ldBar.style.width=cur+'%';
    ldPct.textContent=cur+'%';
    ldStep.textContent=s.txt;
    setTimeout(step,s.ms);
  } else { si++; setTimeout(step,40); }
}
function done(){
  setTimeout(()=>{
    loader.style.opacity='0';loader.style.pointerEvents='none';
    stage.style.opacity='1';
    setTimeout(()=>loader.style.display='none',700);
  },100);
}
step();

// CANVAS CONSTELAÇÕES MELHORADAS
const cvs=document.getElementById('cvs');
const cx=cvs.getContext('2d');
let W,H;
function rsz(){W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight;}
rsz(); window.addEventListener('resize',rsz);

// Estrelas de fundo estáticas (brilho pulsante)
const stars=Array.from({length:120},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*1.5+.2,
  a:Math.random()*.6+.1,
  speed:Math.random()*.02+.005,
  phase:Math.random()*Math.PI*2
}));

// Nós da constelação (móveis)
const pts=Array.from({length:70},()=>({
  x:Math.random()*window.innerWidth,
  y:Math.random()*window.innerHeight,
  vx:(Math.random()-.5)*.18,
  vy:(Math.random()-.5)*.18,
  r:Math.random()*1.8+.5,
  a:Math.random()*.5+.15,
  pulse:Math.random()*Math.PI*2,
  bright:Math.random()>.85 // estrela brilhante
}));

let mx=-9999,my=-9999;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});

let t=0;
function draw(){
  t+=.012;
  cx.clearRect(0,0,W,H);

  // Estrelas estáticas pulsantes
  stars.forEach(s=>{
    const a=s.a*(0.5+0.5*Math.sin(t*s.speed*80+s.phase));
    cx.beginPath();cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(0,229,255,${a})`;cx.fill();
  });

  // Conexões com gradiente de brilho
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
    const maxD=110;
    if(d<maxD){
      const alpha=.12*(1-d/maxD);
      const g=cx.createLinearGradient(pts[i].x,pts[i].y,pts[j].x,pts[j].y);
      g.addColorStop(0,`rgba(0,229,255,${alpha*2})`);
      g.addColorStop(.5,`rgba(0,180,255,${alpha})`);
      g.addColorStop(1,`rgba(0,229,255,${alpha*2})`);
      cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);
      cx.strokeStyle=g;cx.lineWidth=.5;cx.stroke();
    }
  }

  // Nós da constelação
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    // atração suave ao mouse
    const dx=mx-p.x,dy=my-p.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<200){p.vx+=dx*.00004;p.vy+=dy*.00004;}
    p.vx*=.994;p.vy*=.994;
    p.pulse+=.03;

    const pulsed=p.a*(0.7+0.3*Math.sin(p.pulse));

    if(p.bright){
      // estrela brilhante com halo
      cx.beginPath();cx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
      cx.fillStyle=`rgba(0,229,255,${pulsed*.15})`;cx.fill();
      cx.beginPath();cx.arc(p.x,p.y,p.r*1.5,0,Math.PI*2);
      cx.fillStyle=`rgba(0,229,255,${pulsed*.35})`;cx.fill();
    }
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=`rgba(0,229,255,${pulsed})`;cx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

// GLITCH OCASIONAL
const title=document.querySelector('.title');
setInterval(()=>{
  if(Math.random()>.82){
    title.style.textShadow='2px 0 #ff0055,-2px 0 #00e5ff,0 0 18px rgba(0,229,255,.9)';
    setTimeout(()=>{
      title.style.textShadow='0 0 18px rgba(0,229,255,.9),0 0 50px rgba(0,229,255,.4),0 0 100px rgba(0,229,255,.15)';
    },70);
  }
},3000);
</script>
